name: Daily World Cup Bot

# Runs every 6 hours (00, 06, 12, 18 UTC). Catches new highlights within a
# few hours of full-time across all timezones. Also runnable manually via
# the Actions tab.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Fetch match scores (yesterday + today)
        run: node scripts/fetch-match-scores.mjs

      - name: Fetch YouTube highlights
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-highlights.mjs

      - name: Fetch YouTube match previews
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-match-previews.mjs

      - name: Generate matchday recap blog post (yesterday)
        run: node scripts/generate-matchday-recap.mjs || true

      - name: Commit data updates
        id: commit
        run: |
          git config user.name "wc-bot"
          git config user.email "bot@myworldcupguide.com"
          git add src/data/matchResults.json src/data/blogPosts.ts src/data/contentVideos.json
          if git diff --cached --quiet; then
            echo "no data changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "bot: daily match scores + highlights + recap"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Skip the build + deploy on scheduled runs when nothing changed. The
      # site is ~56 MB of static export, so this cuts the bot's bandwidth
      # footprint to near zero on no-op runs. Manual workflow_dispatch runs
      # always proceed so they can be used to force a redeploy after code
      # pushes that didn't change data.
      - name: Skip if nothing to deploy
        if: steps.commit.outputs.changed != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "No data changes and not a manual run . skipping build + deploy to save bandwidth."
          echo "SKIP_DEPLOY=true" >> $GITHUB_ENV

      - name: Snapshot JSON before build
        if: env.SKIP_DEPLOY != 'true'
        run: |
          echo "=== matchResults.json BEFORE build ==="
          node -e "const d = require('./src/data/matchResults.json'); console.log('FT count:', Object.values(d).filter(v => v.status === 'FT').length); console.log('keys:', Object.keys(d).join(','))"

      - name: Build site (clean)
        if: env.SKIP_DEPLOY != 'true'
        run: |
          rm -rf .next out node_modules/.cache
          npm run build

      - name: Snapshot rendered HTML
        if: env.SKIP_DEPLOY != 'true'
        run: |
          echo "=== team codes rendered on home page ==="
          grep -oE "MEX|RSA|KOR|CZE|CAN|BIH|USA|PAR|QAT|SWI|BRA|MAR|HAI|SCO|AUS|TUR" out/index.html | sort -u || true
          echo "=== scores embedded on schedule page ==="
          grep -oE "[0-9]+-[0-9]+" out/schedule/index.html | sort | uniq -c | head -20 || true

      - name: Verify build contains latest match data
        if: env.SKIP_DEPLOY != 'true'
        run: |
          # Cross-check that the latest FT score from matchResults.json made it
          # into BOTH the homepage strip AND the schedule page. If either is
          # missing the scores, fail the run before deploy so we don't ship
          # stale HTML.
          node -e '
            const fs = require("fs")
            const results = JSON.parse(fs.readFileSync("src/data/matchResults.json", "utf8"))
            const final = Object.entries(results).filter(([,r]) => r.status === "FT" || r.status === "AET" || r.status === "PEN")
            if (!final.length) { console.log("no FT data, skipping verify"); process.exit(0) }
            const home = fs.readFileSync("out/index.html", "utf8")
            const sched = fs.readFileSync("out/schedule/index.html", "utf8")
            // Home: count FinishedCard purple gradients.
            const homeCards = (home.match(/#231645 0%, #4f1ea1/g) || []).length
            // Schedule: count score badges (dark purple pill with NN-NN).
            const schedScores = new Set()
            for (const [, r] of final) schedScores.add(`${r.homeScore}-${r.awayScore}`)
            let schedHits = 0
            for (const s of schedScores) if (sched.includes(s)) schedHits++
            console.log(`FT in data: ${final.length}; home FT cards: ${homeCards}; schedule distinct scores rendered: ${schedHits}/${schedScores.size}`)
            if (homeCards === 0) { console.error("FAIL: home missing FT cards"); process.exit(1) }
            if (schedHits === 0) { console.error("FAIL: schedule missing FT scores"); process.exit(1) }
          '

      - name: Package out/ directory
        if: env.SKIP_DEPLOY != 'true'
        run: |
          rm -f out/api/votes.json
          cd out && zip -r ../site.zip . -x ".*"

      - name: Upload to HostGator via FTPS
        if: env.SKIP_DEPLOY != 'true'
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          curl --ssl-reqd -k --user "$FTP_USER:$FTP_PASS" -T site.zip "ftp://$FTP_HOST/public_html/"
          curl --ssl-reqd -k --user "$FTP_USER:$FTP_PASS" -T extract.php "ftp://$FTP_HOST/public_html/"

      - name: Trigger server-side extract
        if: env.SKIP_DEPLOY != 'true'
        env:
          EXTRACT_TOKEN: ${{ secrets.EXTRACT_TOKEN }}
        run: |
          curl -sk "https://myworldcupguide.com/extract.php?t=$EXTRACT_TOKEN" | tail -5

      - name: Ping IndexNow
        if: env.SKIP_DEPLOY != 'true'
        run: node scripts/submit-indexnow.mjs || true
